# wal-colors.conf — auto-generated by wal-apply, do not edit manually

# Status bar colors
set -g status-style                "fg=#c2c2c6,bg=#090c1c"
set -g status-left-style           "fg=#616e85,bg=#090c1c,bold"
set -g status-right-style          "fg=#616b96,bg=#090c1c"

# Windows
set -g window-status-style         "fg=#616b96,bg=#090c1c"
set -g window-status-current-style "fg=#c2c2c6,bg=#0f263a,bold"
set -g window-status-separator     "  "

# Pane borders
set -g pane-border-style           "fg=#0f263a"
set -g pane-active-border-style    "fg=#616e85"

# Messages / command prompt
set -g message-style               "fg=#c2c2c6,bg=#0f263a"
set -g message-command-style       "fg=#616e85,bg=#0f263a"

# Copy mode highlight
set -g mode-style                  "fg=#090c1c,bg=#616e85"
