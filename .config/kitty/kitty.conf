# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# you can choose themes from $HOME/.config/kitty/kitty-themes/
include ./kitty-themes/MonaLisa.conf
# font_family FantasqueSansM Nerd Font Mono Bold
font_size 12.0
# bold_font auto
# italic_font auto
# bold_italic_font auto

background_opacity 1.0
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

clipboard_control write-clipboard write-primary read-clipboard read-primary

window_padding_width 4
# selection_foreground none
# selection_background none
# foreground #dddddd
# background #000000
# cursor #dddddd

# BEGIN_KITTY_THEME
# ENCOM
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Symbol mapping for proper character rendering
# Force nerd font symbols to use Symbols Nerd Font
symbol_map U+E5FA-U+E62B,U+E700-U+E7C5,U+F000-U+F2E0,U+E200-U+E2A9,U+F500-U+FD46 Symbols Nerd Font Mono

# Box drawing and geometric shapes (for progress bars, etc.)
symbol_map U+2500-U+257F,U+2580-U+259F JetBrainsMono Nerd Font Mono

# Note: The opencode progress bar uses ･ (U+FF65) which is not in JetBrainsMono.
# This character will fall back to FreeSans or another system font.

# Send distinct escape sequences for modified enter keys so tmux/apps can distinguish them
map shift+enter   send_text all \x1b[13;2u
map ctrl+enter    send_text all \x1b[13;5u
# Disable kitty's built-in kitty_mod+e (open URL hints) — we don't use it
map kitty_mod+e   no_op