# Starship prompt — nic rice
# Palette follows pywal colors via STARSHIP_CONFIG reload on wal-apply

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

right_format = """$kubernetes$docker_context"""

[os]
disabled = false
style = "bold blue"

[os.symbols]
Arch = " "
Fedora = " "
Ubuntu = " "
Debian = " "
Macos = " "
Windows = " "

[username]
show_always = false
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style) "

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = "  "

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "took [$duration]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[kubernetes]
disabled = false
style = "bold blue"
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) '

[docker_context]
disabled = false
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "bold yellow"
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version )]($style)"
